name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install maturin
        run: pip install maturin

      - name: Install patchelf (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y patchelf

      - name: Install delvewheel (Windows only)
        if: runner.os == 'Windows'
        run: pip install delvewheel

      # Activate the MSVC Developer Command Prompt so cl.exe and lib.exe are
      # on PATH. Go's CGO then uses MSVC and produces folio.lib natively.
      - name: Set up MSVC developer environment (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build wheels
        run: maturin build --release --out target/wheels/

      - name: Repair wheel with delvewheel (Windows only)
        # delvewheel bundles folio.dll (and any transitive DLLs) inside the wheel
        # so end-users don't need to install anything extra.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem target\wheels\*.whl | Select-Object -First 1).FullName
          $dllFile = Get-ChildItem -Recurse -Path target\release\build -Filter folio.dll | Select-Object -First 1
          $dllDir = $dllFile.DirectoryName
          Write-Host "Repairing $wheel with DLL from $dllDir"
          delvewheel repair $wheel --wheel-dir target\wheels\ --add-path $dllDir
          Remove-Item $wheel

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: target/wheels/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # OIDC trusted publisher — no API token needed
    permissions:
      id-token: write

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI via trusted publisher (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
